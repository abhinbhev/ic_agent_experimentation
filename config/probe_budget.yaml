# Probe budget controls and Incremental Value Framework weights.
# See docs/archetecture.md ("Probe Budget Controls" and "Incremental
# Value Framework") for the rationale behind these defaults.

probe_budget:
  max_rounds: 3
  max_probes_per_round: 5
  max_total_probes: 8

score_fusion:
  bm25_weight: 0.5
  embedding_weight: 0.5
  fusion_method: weighted_sum
  rrf_k: 60

incremental_value_weights:
  unresolved_gaps: 0.40
  low_confidence: 0.30
  new_hypotheses: 0.20
  irrelevance: 0.05
  budget_headroom: 0.05
  stop_threshold: 0.30
