# Similar Plan corpus -- archetypes only (reasoning/probe patterns), never
# answers or data. Add more archetypes as they are identified.

- id: brand_country_period_performance
  intent: "How is a brand's performance in a country in a given period?"
  dataset_family: ["Brand Guidance"]
  analysis_type: "brand_performance_overview"
  probe_sequence:
    - "change in equity"
    - "factors affecting equity"
    - "perceptions of the brand"
    - "consumption"
    - "demographic insights"
  failure_modes: []
  stop_condition: "all 5 probe areas covered with no major remaining gaps"
  description: >
    Use when the user asks generally how a brand is performing in a given
    country over a given period (a brand health / brand guidance check).
