# Similar Plan corpus -- archetypes for the Category domain only.
# Reasoning/probe patterns, never answers or data.

- id: brand_country_period_performance_category
  intent: "How is a brand performing in a country in a given period?"
  dataset_family: ["Category"]
  analysis_type: "brand_performance_overview"
  probe_sequence:
    - "brand consumption metrics"
    - "demographic insights"
    - "top competitors"
    - "penetration and frequency"
    - "year-over-year or sequential period comparison"
  failure_modes: []
  stop_condition: "key performance dimensions covered with no major remaining gaps"
  description: >
    Use when the user asks how a brand is performing in a given country and period.
    Covers overall brand health, demographic dynamics, penetration, and trend context.

- id: kpi_retrieval_category
  intent: "What is the [KPI] for given optional granularities like brand, country, period etc?"
  dataset_family: ["Category"]
  analysis_type: "specific_kpi_analysis"
  probe_sequence:
    - "specific KPI value based on the dataset"
    - "comparative analysis to same period last year"
  failure_modes: []
  stop_condition: "all probe areas covered with no major remaining gaps"
  description: >
    Use when the user asks for a specific Category KPI for a brand in a given country
    over a given period. The probe sequence is precise and exhaustive. The granularities
    can be brand, country, period, and/or other dimensions relevant to the dataset.
    There is no need for deeper analysis or additional insights beyond the specific KPI
    value and its comparative analysis to the same period last year.
